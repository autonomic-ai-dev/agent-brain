name: Skills.sh eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [master]
    paths:
      - "agent-brain/src/skills_sh.rs"
      - "agent-brain/src/fixture.rs"
      - "docs/benchmarks/skills-sh/**"
      - "docs/benchmarks/fixture-2k.db"
      - ".github/workflows/stage-skills-sh-eval.yml"

concurrency:
  group: skills-sh-eval-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  eval:
    name: skills.sh snapshot eval (~2000 index)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Run skills.sh eval gate (committed fixture-2k.db, no network)
        run: cargo run --release -p agent-brain -- eval --skills-sh --write docs/benchmarks/skills-sh-latest.json

      - name: Verify fixture DB metadata
        run: cargo run --release -p agent-brain -- fixture verify --db docs/benchmarks/fixture-2k.db

      - name: Upload skills.sh proof artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-brain-skills-sh-proofs
          path: docs/benchmarks/skills-sh-latest.json
          if-no-files-found: error
          retention-days: 30

  sync:
    name: Refresh skills.sh snapshot (optional)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Sync expanded snapshot from skills.sh
        run: |
          cargo run --release -p agent-brain -- skills-sh sync \
            --target 2000 \
            --merge \
            --delay-ms 400 \
            --write docs/benchmarks/skills-sh/snapshot.json

      - name: Rebuild fixture DB from refreshed snapshot
        run: |
          cargo run --release -p agent-brain -- fixture build \
            --write docs/benchmarks/fixture-2k.db

      - name: Re-run eval on refreshed snapshot
        run: cargo run --release -p agent-brain -- eval --skills-sh
